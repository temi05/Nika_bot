name: Keep Bot Alive 🚀

on:
  schedule:
    - cron: '*/5 * * * *'  # Запуск каждые 5 минут
  workflow_dispatch:      # Чтобы можно было запустить вручную

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping 📡
        run: |
          curl -s https://nika-bot-1.onrender.com/api/leaderboard?chat_id=123 > /dev/null
          echo "Пинг отправлен! Бот проснулся! 😎"
