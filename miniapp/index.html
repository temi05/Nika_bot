<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nika Dashboard</title>
    <!-- Телеграм WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Иконочный шрифт -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        
        <!-- Вкладка: Профиль -->
        <section id="tab-profile" class="tab-content active">
            <div class="header">
                <h2>Профиль</h2>
                <div class="user-info">
                    <img id="user-avatar" src="https://via.placeholder.com/64" alt="Аватар">
                    <h3 id="user-name">Имя пользователя</h3>
                    <p id="user-id" class="subtitle">@username</p>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card glass box-glow">
                    <i class="fas fa-star text-yellow"></i>
                    <span class="stat-value" id="user-level">1</span>
                    <span class="stat-label">Уровень</span>
                </div>
                <div class="stat-card glass box-glow">
                    <i class="fas fa-heart text-red"></i>
                    <span class="stat-value" id="user-rep">0</span>
                    <span class="stat-label">Репутация</span>
                </div>
                <div class="stat-card glass box-glow">
                    <i class="fas fa-exclamation-triangle text-orange"></i>
                    <span class="stat-value" id="user-warns">0</span>
                    <span class="stat-label">Предупреждения</span>
                </div>
            </div>

            <div class="xp-section glass">
                <div class="xp-header">
                    <span>Опыт (XP)</span>
                    <span id="xp-text">0 / 100</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="xp-bar" style="width: 0%;"></div>
                </div>
            </div>
        </section>

        <!-- Вкладка: Лидерборд -->
        <section id="tab-leaderboard" class="tab-content">
            <div class="header">
                <h2>Лидерборд</h2>
                <div class="tab-switcher">
                    <button class="switch-btn active" data-target="top-level">Топ Уровень</button>
                    <button class="switch-btn" data-target="top-rep">Топ Репутация</button>
                </div>
            </div>
            <div class="leaderboard-list glass" id="leaderboard-container">
                <!-- Список генерируется JS -->
                <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Загрузка...</div>
            </div>
        </section>

        <!-- Вкладка: Aternos -->
        <section id="tab-aternos" class="tab-content">
            <div class="header">
                <h2>Minecraft Сервер</h2>
            </div>
            
            <div class="server-status-card glass box-glow">
                <div class="status-indicator">
                    <div class="point red" id="status-dot"></div>
                    <span id="server-status">Оффлайн</span>
                </div>
                
                <h1 class="server-ip" id="server-ip">play.example.com</h1>
                <p class="server-online"><i class="fas fa-users"></i> Онлан: <span id="server-players">0 / 0</span></p>
                
                <button class="action-btn glowing-btn" id="btn-start-server">
                    <i class="fas fa-power-off"></i> Запустить сервер
                </button>
            </div>
        </section>

        <!-- Вкладка: Настройки (Админ) -->
        <section id="tab-settings" class="tab-content">
            <div class="header">
                <h2>Настройки Чата</h2>
                <p class="subtitle text-orange"><i class="fas fa-shield-alt"></i> Только для администраторов</p>
            </div>
            
            <div class="settings-group glass">
                <h3>Управление плохими словами</h3>
                <div class="input-group">
                    <input type="text" id="blacklist-input" placeholder="Введите слово...">
                    <button class="action-btn small-btn" id="btn-add-word"><i class="fas fa-plus"></i></button>
                </div>
                <ul class="bad-words-list" id="bad-words-list">
                    <!-- Загружается из JS -->
                </ul>
            </div>
        </section>

        <!-- Уведомления Toasts -->
        <div id="toast-container"></div>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav glass">
            <a href="#" class="nav-item active" data-tab="tab-profile">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </a>
            <a href="#" class="nav-item" data-tab="tab-leaderboard">
                <i class="fas fa-trophy"></i>
                <span>Рейтинг</span>
            </a>
            <a href="#" class="nav-item" data-tab="tab-aternos">
                <i class="fas fa-gamepad"></i>
                <span>Aternos</span>
            </a>
            <a href="#" class="nav-item" data-tab="tab-settings" id="nav-settings" style="display: none;">
                <i class="fas fa-cog"></i>
                <span>Настройки</span>
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
